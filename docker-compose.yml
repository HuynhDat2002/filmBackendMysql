version: '3.9'
services:

  nosql-db:
    image: mongo
    ports:
      - "27018:27017"
    container_name: nosql-db
    volumes:
      - ./db/:/data/db

  rabbitmq:
    image: rabbitmq:alpine
    container_name: rabbitmq
    ports:
      - '5672:5672'

  film:
    build:
      dockerfile: Dockerfile
      context: ./film
    container_name: film
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
    volumes:
      - .:/app
      - /app/film/node_modules
    ports:
      - "5003:5003"
    env_file:
      - ./film/.env
    expose:
      - 5003
    
  
  film1:
    build:
      dockerfile: Dockerfile
      context: ./film
    container_name: film1
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app
      - /app/film1/node_modules

    env_file:
      - ./film/.env
    expose:
      - 5003

  film2:
    build:
      dockerfile: Dockerfile
      context: ./film
    container_name: film2
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app
      - /app/film2/node_modules

    env_file:
      - ./film/.env
    expose:
      - 5003

  user:
    build:
      dockerfile: Dockerfile
      context: ./user
    container_name: user
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app
      - /app/user/node_modules
    env_file:
      - ./user/.env
    expose:
      - 5000

  user1:
    build:
      dockerfile: Dockerfile
      context: ./user
    container_name: user1
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app
      - /app/user1/node_modules
    env_file:
      - ./user/.env
    expose:
      - 5000
    
  user2:
    build:
      dockerfile: Dockerfile
      context: ./user
    container_name: user2
    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app
      - /app/user2/node_modules
    env_file:
      - ./user/.env
    expose:
      - 5000
  admin:
    build:
      dockerfile: Dockerfile
      context: ./admin
    container_name: admin

    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app/
      - /app/admin/node_modules
    env_file:
      - ./admin/.env
    expose:
      - 5002

  admin1:
    build:
      dockerfile: Dockerfile
      context: ./admin
    container_name: admin1

    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app/
      - /app/admin1/node_modules
    env_file:
      - ./admin/.env
    expose:
      - 5002

  admin2:
    build:
      dockerfile: Dockerfile
      context: ./admin
    container_name: admin2

    restart: always
    depends_on:
      - "nosql-db"
      - "rabbitmq"
      # - "redis"
    volumes:
      - .:/app/
      - /app/admin2/node_modules
    env_file:
      - ./admin/.env
    expose:
      - 5002

      
  nginx-proxy:
    image: reserve-proxy
    container_name: nginx-mircro
    build:
      dockerfile: Dockerfile
      context: ./proxy
    depends_on:
      - film
      - film1
      - film2
      - user
      - user1
      - user2
      - admin
      - admin1
      - admin2
    ports:
      - 443:443
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
      - /var/log/nginx:/var/log/nginx
      - /etc/ssl/certs:/etc/nginx/ssl
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: elasticsearch-digitic
    restart: always
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:7.10.2
    container_name: logstash
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh  # Đặt múi giờ của hệ thống
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - /var/log/nginx:/var/log/nginx
      - ./logstash/csv:/usr/share/logstash/csv
      - ./logstash/data/GeoLite2-ASN.mmdb:/usr/share/logstash/GeoLite2-ASN.mmdb
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
      - "9600:9600"

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.2
    container_name: kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

      
volumes:
  esdata:
    driver: local