    user nginx;

    worker_processes 4;

    events { 
        worker_connections 1024; 
    }

    http {

        log_format custom '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" "$gzip_ratio"';

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # load balancing
        upstream user {
            server user:5000;
            server user1:5000;
            server user2:5000;

        }
        upstream admin {
            server admin:5002;
            server admin1:5002;
            server admin2:5002;

        }
        upstream film {
            server film:5003;
            # server film1:5003;
            # server film2:5003;

        }

        server {
            listen 80;
            server_name localhost;

            # Redirect all HTTP requests to HTTPS
          
            return 301 https://$host$request_uri;
            
           
        }
        server {
            # tls certification
            listen 443 ssl;
            server_name localhost;

            ssl_certificate /etc/ssl/certs/selfsigned.crt;
            ssl_certificate_key /etc/ssl/certs/selfsigned.key;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;
            ssl_ciphers HIGH:!aNULL:!MD5;

            access_log  /var/log/nginx/access.log custom;
            error_log  /var/log/nginx/error.log warn;
            charset utf-8;

            # for frontend can connect to backend through https
            location / {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH';
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, x-client-id';
            }
            
            
            location /user {
                proxy_pass http://user;
                proxy_http_version 1.1;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_cache_bypass $http_upgrade;
                
            }

            location /admin {
                proxy_pass http://admin;
                proxy_http_version 1.1;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_cache_bypass $http_upgrade;
               
            }

            location /film {
                proxy_pass http://film;
                proxy_http_version 1.1;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_cache_bypass $http_upgrade;
               
            }
        
        }
    }